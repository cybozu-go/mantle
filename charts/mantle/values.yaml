replicaCount: 1

image:
  repository: ghcr.io/cybozu-go/mantle
  pullPolicy:
  # The image reference: a tag and/or a digest (e.g. "1.2.3@sha256:...").
  reference: 0.13.0@sha256:c6f95716364070fc1f2ce2d307bb3e6b0b5efdb84ab719e9efc2cc8b7c534549

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "mantle-controller"

annotations: {}
labels: {}
podAnnotations: {}
podLabels: {}
resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

controller:
  role: standalone
  ports: []
  env: []
  mtls:
    # controller.mtls.serverCACertConfigMap –- ConfigMap name containing the CA certificate for server mTLS. Only used when the role is primary.
    serverCACertConfigMap: ""
    # controller.mtls.clientTLSSecret -- TLS secret name containing the client certificate and key for mTLS. Only used when the role is primary.
    clientTLSSecret: ""

    # controller.mtls.clientCACertConfigMap -- ConfigMap name containing the CA certificate for client mTLS. Only used when the role is secondary.
    clientCACertConfigMap: ""
    # controller.mtls.serverTLSSecret -- TLS secret name containing the server certificate and key for mTLS.  Only used when the role is secondary.
    serverTLSSecret: ""

replicationService:
  # type:
  # port:
  # targetPort:

webhook:
  # webhook.enabled -- If true, deploy a webhook to prevent Pods from mounting PVCs that were
  #   created as backup target PVCs by a secondary Mantle. We intend this webhook to be enabled
  #   on a secondary Mantle because those PVCs should only be used for receiving backup data.
  #
  #   When deploying multiple Mantle instances on a K8s cluster, at most one instance
  #   can have this webhook enabled.
  enabled: false
  # webhook.replicaCount -- Number of replicas for the webhook deployment.
  replicaCount: 1
  # webhook.podAnnotations -- Annotations to add to the webhook pod.
  podAnnotations: {}
  # webhook.podLabels -- Labels to add to the webhook pod.
  podLabels: {}
  # webhook.resources -- Resource requests and limits for the webhook container.
  resources: {}
  # webhook.nodeSelector -- Node selector for the webhook pod.
  nodeSelector: {}
  # webhook.tolerations -- Tolerations for the webhook pod.
  tolerations: []
  # webhook.affinity -- Affinity rules for the webhook pod.
  affinity: {}
  service:
    # webhook.service.port -- Port for the webhook service. 
    port: 9443
    # webhook.service.targetPort -- Target port for the webhook server pod.
    targetPort: 9443
  certificate:
    # webhook.certificate.managedBy -- Can be "cert-manager" or "helm".
    managedBy: cert-manager
    # webhook.certificate.dnsDomain -- Only used when managedBy is "helm". Cluster DNS domain (required for requesting TLS certificates).
    dnsDomain: cluster.local
    # webhook.certificate.existingCertManagerIssuer -- Only used when managedBy is "cert-manager". Specify the cert-manager issuer to be used for AdmissionWebhook.
    existingCertManagerIssuer: {}
      # group: cert-manager.io
      # kind: Issuer
      # name: webhook-issuer
