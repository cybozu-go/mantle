apiVersion: v1
kind: Pod
metadata:
  namespace: "%s"
  name: "%s"
spec:
  containers:
    - name: ubuntu
      image: ubuntu:20.04
      command: ["/usr/bin/sleep", "infinity"]
      volumeMounts:
        - mountPath: /mnt
          name: my-volume
  volumes:
    - name: my-volume
      persistentVolumeClaim:
        claimName: "%s"
